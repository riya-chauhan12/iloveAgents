name: Welcome New Issue Author

# Trigger: fires whenever a new issue is opened
on:
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      # Post a welcome comment tagging the issue author
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const author = context.payload.issue.user.login;
            const issueNumber = context.payload.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `👋 Hey @${author}! Thanks for opening this issue.\n\nOur maintainer will review it shortly and get back to you.\n\nWhile you wait:\n- 📖 Check our [Contributing Guide](https://github.com/AditthyaSS/iloveAgents/blob/main/CONTRIBUTING.md)\n- 💬 Feel free to add more details to help us understand better\n\nAlso — this project is completely free and community-driven. If iloveAgents has been useful to you in any way, the single best thing you can do to support it is [⭐ star the repo](https://github.com/AditthyaSS/iloveAgents). It helps others discover the project and keeps the community growing. Every star genuinely matters. 🙏\n\n— [@AditthyaSS](https://github.com/AditthyaSS)`
            });
