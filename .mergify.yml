pull_request_rules:
  - name: Thank contributor on merge
    conditions:
      - merged
    actions:
      comment:
        message: |
          🎉 Your contribution has been merged and is now live on [iloveagents.vercel.app](https://iloveagents.vercel.app)!
          Thank you for taking the time to contribute to iloveAgents — it genuinely means a lot. Every contribution, big or small, makes this project better for everyone who uses it.
          If you haven't already, please consider ⭐ **starring the repo** — it helps others discover iloveAgents and keeps the community growing. [Star it here](https://github.com/AditthyaSS/iloveAgents)
          Hope to see you again soon. You are always welcome here. 🙌
          — [@AditthyaSS](https://github.com/AditthyaSS)

  - name: Welcome first time contributor
    conditions:
      - author != AditthyaSS
      - "#commits = 1"
    actions:
      comment:
        message: |
          Hey @{{author}}! 👋
          Wow — your first contribution to iloveAgents! This is a big deal and I want you to know it means a lot. 🎊
          Every agent on this platform started exactly like this — someone like you deciding to spend their time building something useful for everyone. That is something to be proud of.
          A few things while you wait for the review:
          - ⭐ **Star the repo** if you haven't already. [Star it here](https://github.com/AditthyaSS/iloveAgents)
          - 📖 Check the [Contributing Guide](https://github.com/AditthyaSS/iloveAgents/blob/main/CONTRIBUTING.md)
          - 💬 Drop a comment if you get stuck — I reply within 24 hours
          Can't wait to ship this with you. 🚀
          Welcome to the iloveAgents family. 🙏
          — [@AditthyaSS](https://github.com/AditthyaSS)

  # Auto-merge rule
  # Vercel check is intentionally excluded from required conditions.
  # Vercel preview deployment fails on all outside contributor PRs
  # due to fork authorization restrictions — this is expected and
  # should never block merging. Production deploys from main automatically.
  - name: Auto merge when approved
    conditions:
      - "#approved-reviews-by>=1"
      - check-success=Summary
      # - check-success=Vercel  ← intentionally removed, see note above
    actions:
      merge:
        method: merge

  # Merge conflict rule
  # Notifies the author only when GitHub has CONFIRMED the PR has a real merge
  # conflict. The "conflict" attribute is set by GitHub after it finishes
  # computing mergeability — adding "-draft" ensures we don't fire on PRs still
  # being processed, and "-closed" prevents triggering on already-closed PRs.
  - name: Notify author on merge conflict
    conditions:
      - conflict
      - -draft
      - -closed
      - -merged
    actions:
      comment:
        message: |
          ⚠️ Hey @{{author}}! This PR has a merge conflict that needs to be resolved before we can review or merge it.
          Please sync your branch with the latest main and fix the conflicts.
          Need help? Check out [resolving merge conflicts](https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/addressing-merge-conflicts/resolving-a-merge-conflict-using-the-command-line).
          — [@AditthyaSS](https://github.com/AditthyaSS)

  # Lock file rules — two separate rules for two different scenarios.
  # Rule A: package-lock.json changed but package.json was NOT touched.
  # Usually caused by running npm install with a different npm version locally.
  - name: Flag package-lock.json changed without package.json
    conditions:
      - "files~=^package-lock\\.json$"
      - "-files~=^package\\.json$"
    actions:
      comment:
        message: |
          hey @{{author}}! 👋
          It looks like `package-lock.json` was changed but `package.json` was not.
          This is usually unintentional — it happens when `npm install` is run locally with a different npm version.
          Please revert it by running:
          `git checkout package-lock.json`
          Then push again. 🙏
          — [@AditthyaSS](https://github.com/AditthyaSS)
      label:
        add:
          - needs-fix

  # Rule B: package.json changed but package-lock.json was NOT updated.
  # Could mean missing npm install after adding a dependency, or just a
  # metadata-only change (scripts, description, version) which is fine.
  - name: Flag package.json changed without package-lock.json
    conditions:
      - "files~=^package\\.json$"
      - "-files~=^package-lock\\.json$"
    actions:
      comment:
        message: |
          hey @{{author}}! 👋
          You changed `package.json` but `package-lock.json` was not updated.
          Quick check before we review:
          → If you added or removed a package:
          Please run `npm install` and commit the updated `package-lock.json` too.
          Both files need to change together. ✅
          → If you only changed metadata (scripts, description, version etc):
          You can safely ignore this message. ✅
          Just wanted to make sure nothing was missed! 🙏
          — [@AditthyaSS](https://github.com/AditthyaSS)
      label:
        add:
          - needs-fix

  # PR title format check
  # Flags PRs whose title does not follow the "type: description" convention.
  # Valid types: feat, fix, docs, style, refactor, test, chore
  - name: Flag invalid PR title format
    conditions:
      - "-title~=^(feat|fix|docs|style|refactor|test|chore)(\\(.+\\))?!?:\\s.+"
    actions:
      comment:
        message: |
          hey @{{author}}! 👋
          Your PR title doesn't follow our required format.
          Please update it to:
          `type: short description`
          Valid types: feat, fix, docs, style, refactor, test, chore
          Example: `feat: add sales discovery agent`
          — [@AditthyaSS](https://github.com/AditthyaSS)
      label:
        add:
          - needs-fix

  # Empty PR description check
  # Flags PRs with no description or a description shorter than 20 characters.
  - name: Flag empty PR description
    conditions:
      - "body~=^.{0,19}$"
    actions:
      comment:
        message: |
          hey @{{author}}! 👋
          Your PR description is empty.
          Please add:
          - What changes you made and why
          - The issue this PR closes: `Closes #issue_number`
          - Screenshots if it's a UI change
          A good description helps us review and merge faster! 🚀
          — [@AditthyaSS](https://github.com/AditthyaSS)
      label:
        add:
          - needs-fix

  # No linked issue check
  # Flags PRs that don't reference a closing keyword + issue number in the body.
  - name: Flag missing linked issue
    conditions:
      - "-body~=(?i)(closes?|fixes?|resolves?)\\s+#[0-9]+"
      - "body~=.{20,}"
    actions:
      comment:
        message: |
          hey @{{author}}! 👋
          Your PR doesn't seem to be linked to an issue.
          Please add this line to your PR description:
          `Closes #issue_number`
          Replace issue_number with the actual issue number you are solving.
          This helps us track what each PR is fixing! 🔗
          — [@AditthyaSS](https://github.com/AditthyaSS)
      label:
        add:
          - needs-fix
